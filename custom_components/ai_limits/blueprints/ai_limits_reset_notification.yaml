blueprint:
  name: AI Limits Reset Notification
  description: >-
    Notifies you when an AI model's limit has reset and is ready to use again, 
    only if it was fully used up (exhausted) beforehand.
  domain: automation
  input:
    limit_sensors:
      name: AI Limit Sensors
      description: The AI utilization/window sensors to monitor.
      selector:
        entity:
          domain:
            - sensor
          multiple: true
    notify_script:
      name: Notification Script
      description: The script to run for notification (expects script.notify interface).
      default: script.notify
      selector:
        entity:
          domain: script
    notify_severity:
      name: Severity / Target Scope
      description: The severity/target parameter to pass to the notification script.
      default: "blu"
      selector:
        text: {}

trigger:
  - platform: state
    entity_id: !input limit_sensors

condition:
  - condition: template
    value_template: >-
      {# Ensure both states exist and are different #}
      {{ trigger.from_state is not none and trigger.to_state is not none and
         trigger.from_state.state != trigger.to_state.state }}
  - condition: template
    value_template: >-
      {# Verify it was exhausted before (remaining_percent was 0 or status was exhausted) #}
      {% set was_exhausted = trigger.from_state.attributes.status == 'exhausted' or 
                             trigger.from_state.attributes.remaining_percent == 0 or
                             trigger.from_state.state is search('Resets in') %}
      {# Verify it is now available #}
      {% set is_available = trigger.to_state.attributes.status == 'within_limit' or 
                            trigger.to_state.attributes.remaining_percent > 0 or
                            trigger.to_state.state is search('% remaining') %}
      {{ was_exhausted and is_available }}

action:
  - action: !input notify_script
    data:
      title: "🤖 AI Limit Reset"
      message: >-
        {{ trigger.to_state.attributes.friendly_name }} is available again!
        Current state: {{ trigger.to_state.state }}
      severity: !input notify_severity
      icon: "mdi:clock-start"
      tag: "ai_limit_reset_{{ trigger.entity_id.split('.')[-1] }}"
      via_notification: true
